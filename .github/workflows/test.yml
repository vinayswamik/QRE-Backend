name: Run Tests

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'handler.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest
