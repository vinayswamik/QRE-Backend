name: Deploy to AWS Lambda

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FUNCTION_NAME: qre-backend
  ECR_REPOSITORY: qre-backend
  LAMBDA_ROLE: arn:aws:iam::149051628500:role/qre-lambda-role

jobs:
  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          CACHE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:cache"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --cache-from type=registry,ref="$CACHE_URI" \
            --cache-to   type=registry,ref="$CACHE_URI",mode=max \
            --tag "$IMAGE_URI" \
            --push \
            .
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Deploy Lambda (handles Zip→Image migration automatically)
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          PACKAGE_TYPE=$(aws lambda get-function-configuration \
            --function-name $FUNCTION_NAME \
            --query PackageType --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$PACKAGE_TYPE" = "Zip" ]; then
            echo "Zip-based Lambda detected — deleting and recreating as Image..."
            aws lambda delete-function --function-name $FUNCTION_NAME
            aws lambda create-function \
              --function-name $FUNCTION_NAME \
              --package-type Image \
              --code ImageUri="$IMAGE_URI" \
              --role $LAMBDA_ROLE \
              --memory-size 1024 \
              --timeout 60
            aws lambda wait function-active --function-name $FUNCTION_NAME

          elif [ "$PACKAGE_TYPE" = "NOT_FOUND" ]; then
            echo "Function not found — creating..."
            aws lambda create-function \
              --function-name $FUNCTION_NAME \
              --package-type Image \
              --code ImageUri="$IMAGE_URI" \
              --role $LAMBDA_ROLE \
              --memory-size 1024 \
              --timeout 60
            aws lambda wait function-active --function-name $FUNCTION_NAME

          else
            echo "Image-based Lambda — updating code..."
            aws lambda update-function-code \
              --function-name $FUNCTION_NAME \
              --image-uri "$IMAGE_URI"
            aws lambda wait function-updated --function-name $FUNCTION_NAME
          fi

      - name: Re-attach API Gateway permission (first deploy only)
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          # Add resource-based policy so API Gateway can invoke Lambda.
          # The 'add-permission' call is idempotent via --statement-id.
          aws lambda add-permission \
            --function-name $FUNCTION_NAME \
            --statement-id api-gateway-invoke \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:$AWS_REGION:149051628500:2gs291cjg2/*" \
          2>/dev/null || echo "Permission already exists — skipping"
