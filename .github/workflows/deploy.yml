name: Deploy to AWS Lambda

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  FUNCTION_NAME: qre-backend
  ECR_REPOSITORY: qre-backend
  LAMBDA_ROLE: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/qre-lambda-role

jobs:
  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          CACHE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:cache"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --cache-from type=registry,ref="$CACHE_URI" \
            --cache-to   type=registry,ref="$CACHE_URI",mode=max \
            --tag "$IMAGE_URI" \
            --push \
            .
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Deploy Lambda (handles Zip→Image migration automatically)
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          PACKAGE_TYPE=$(aws lambda get-function-configuration \
            --function-name $FUNCTION_NAME \
            --query PackageType --output text 2>/dev/null || echo "NOT_FOUND")

          # Default AWS accounts cap Lambda memory at 3008 MB. Raising to 10240
          # requires a service quota increase request (Service Quotas →
          # "Concurrent executions" / "Memory allocation"). Bump this value
          # once the quota is lifted.
          MEMORY_SIZE=3008

          if [ "$PACKAGE_TYPE" = "Zip" ]; then
            echo "Zip-based Lambda detected — deleting and recreating as Image..."
            aws lambda delete-function --function-name $FUNCTION_NAME
            aws lambda create-function \
              --function-name $FUNCTION_NAME \
              --package-type Image \
              --code ImageUri="$IMAGE_URI" \
              --role $LAMBDA_ROLE \
              --memory-size $MEMORY_SIZE \
              --timeout 900
            aws lambda wait function-active --function-name $FUNCTION_NAME

          elif [ "$PACKAGE_TYPE" = "NOT_FOUND" ]; then
            echo "Function not found — creating..."
            aws lambda create-function \
              --function-name $FUNCTION_NAME \
              --package-type Image \
              --code ImageUri="$IMAGE_URI" \
              --role $LAMBDA_ROLE \
              --memory-size $MEMORY_SIZE \
              --timeout 900
            aws lambda wait function-active --function-name $FUNCTION_NAME

          else
            echo "Image-based Lambda — updating code..."
            aws lambda update-function-code \
              --function-name $FUNCTION_NAME \
              --image-uri "$IMAGE_URI"
            aws lambda wait function-updated --function-name $FUNCTION_NAME
            aws lambda update-function-configuration \
              --function-name $FUNCTION_NAME \
              --memory-size $MEMORY_SIZE \
              --timeout 900
            aws lambda wait function-updated --function-name $FUNCTION_NAME
          fi

      # Lambda response streaming is required for the /analyze/stream SSE
      # endpoint to actually deliver events in real time. API Gateway HTTP API
      # does NOT support Lambda response streaming; a Function URL with
      # InvokeMode=RESPONSE_STREAM does. We add/update one so the frontend can
      # hit it directly for SSE while keeping API Gateway for /validate and
      # /analyze. Mangum does not stream, so the /analyze/stream route needs
      # Lambda Web Adapter or a streaming handler to actually chunk over the
      # Function URL — tracked as a follow-up; this step only configures the
      # URL so the infrastructure is ready when that lands.
      - name: Ensure streaming Function URL exists
        run: |
          if aws lambda get-function-url-config --function-name $FUNCTION_NAME >/dev/null 2>&1; then
            aws lambda update-function-url-config \
              --function-name $FUNCTION_NAME \
              --auth-type NONE \
              --invoke-mode RESPONSE_STREAM \
              --cors '{"AllowOrigins":["https://qre.pages.dev","http://localhost:5173"],"AllowMethods":["POST","GET"],"AllowHeaders":["Content-Type","Accept"]}'
          else
            aws lambda create-function-url-config \
              --function-name $FUNCTION_NAME \
              --auth-type NONE \
              --invoke-mode RESPONSE_STREAM \
              --cors '{"AllowOrigins":["https://qre.pages.dev","http://localhost:5173"],"AllowMethods":["POST","GET"],"AllowHeaders":["Content-Type","Accept"]}'
            aws lambda add-permission \
              --function-name $FUNCTION_NAME \
              --statement-id function-url-invoke \
              --action lambda:InvokeFunctionUrl \
              --principal '*' \
              --function-url-auth-type NONE \
              2>/dev/null || true
          fi

      - name: Re-attach API Gateway permission (first deploy only)
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          # Add resource-based policy so API Gateway can invoke Lambda.
          # The 'add-permission' call is idempotent via --statement-id.
          aws lambda add-permission \
            --function-name $FUNCTION_NAME \
            --statement-id api-gateway-invoke \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:$AWS_REGION:$AWS_ACCOUNT_ID:${{ secrets.API_GATEWAY_ID }}/*" \
          2>/dev/null || echo "Permission already exists — skipping"
